<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Report Crime</title>
</head>
<body>
    <div class="container">
        <h1>Report a Crime</h1>
        <form action="/api/reports" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            <div class="form-group">
                <label for="location_lat">Latitude:</label>
                <input type="number" step="any" id="location_lat" name="location_lat" required>
            </div>
            <div class="form-group">
                <label for="location_lng">Longitude:</label>
                <input type="number" step="any" id="location_lng" name="location_lng" required>
            </div>
            <div class="form-group">
                <label for="photo">Upload Photo:</label>
                <input type="file" id="photo" name="photo" accept="image/*">
            </div>
            <button type="submit">Submit Report</button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/realtime.js') }}"></script>
</body>
</html>
