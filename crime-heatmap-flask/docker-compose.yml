version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
      - ./uploads:/uploads
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///app.db
    depends_on:
      - db

  db:
    image: sqlite:latest
    volumes:
      - ./app.db:/app.db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"