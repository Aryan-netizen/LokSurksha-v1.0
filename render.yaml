services:
  # PostgreSQL Database
  - type: pserv
    name: crime-heatmap-db
    plan: free
    databaseName: crime_heatmap
    databaseUser: crime_user

  # Flask Backend
  - type: web
    name: crime-heatmap-backend
    runtime: python
    plan: free
    buildCommand: cd crime-heatmap-flask && pip install -r requirements.txt && python -c "from app import create_app, db; app = create_app(); app.app_context().push(); db.create_all()"
    startCommand: cd crime-heatmap-flask && gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crime-heatmap-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: REQUIRE_REPORT_OTP
        value: false
      - key: OTP_PROVIDER
        value: console
      - key: OTP_DEV_MODE
        value: true
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/crime-heatmap-flask/instance/uploads

  # Next.js Frontend
  - type: web
    name: crime-heatmap-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://crime-heatmap-backend.onrender.com
