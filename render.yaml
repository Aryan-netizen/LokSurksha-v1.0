databases:
  - name: crime-heatmap-db
    plan: free

services:
  # Flask Backend
  - type: web
    name: crime-heatmap-backend
    runtime: python
    plan: free
    buildCommand: pip install -r crime-heatmap-flask/requirements.txt
    startCommand: cd crime-heatmap-flask && PYTHONPATH=/opt/render/project/src/crime-heatmap-flask:$PYTHONPATH gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crime-heatmap-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: REQUIRE_REPORT_OTP
        value: false
      - key: OTP_PROVIDER
        value: console
      - key: OTP_DEV_MODE
        value: true
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/crime-heatmap-flask/instance/uploads

  # Next.js Frontend
  - type: web
    name: crime-heatmap-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://crime-heatmap-backend.onrender.com
